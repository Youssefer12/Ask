<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chno Kay3ajbak F Dari? 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #f3d5ec, #fcd3de); padding: 20px; overflow: hidden;
        }
        .card {
            width: 100%; max-width: 420px; padding: 25px 20px; border-radius: 25px; text-align: center;
            background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative;
        }
        
        .teddy { font-size: 75px; animation: bounce 2s infinite ease-in-out; margin-bottom: 5px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        h1 { color: #d63384; font-size: 1.5rem; margin-bottom: 5px; }
        .sub { color: #a63d68; font-size: 0.9rem; margin-bottom: 15px; }
        
        input, textarea {
            width: 100%; padding: 12px; border: 1px solid #ffc2d1; border-radius: 15px;
            font-size: 1rem; text-align: center; outline: none; margin-bottom: 15px;
        }
        
        textarea {
            text-align: left; resize: none; height: 80px; font-size: 0.9rem; padding: 10px;
            border-color: #ffccd7; background: #fffdfd;
        }

        /* Options Wrapper */
        .options-grid { display: none; flex-direction: column; gap: 10px; margin-top: 10px; text-align: left; }
        
        .option-item {
            display: flex; align-items: center; background: #fff5f7; padding: 10px 15px;
            border-radius: 15px; border: 1px solid #ffe1e7; cursor: pointer; transition: 0.2s;
        }
        .option-item:hover { background: #ffe6eb; border-color: #ffb3c6; }
        .option-item input[type="checkbox"] { width: auto; margin-right: 12px; margin-bottom: 0; cursor: pointer; }
        .option-item label { font-size: 0.9rem; color: #555; cursor: pointer; font-weight: 600; width: 100%; }

        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 50px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: 0.2s; background: #ff4f8b; color: white; margin-top: 10px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .message { margin-top: 15px; font-size: 1.1rem; font-weight: 600; color: #c2185b; display: none; }
        .extra-label { color: #d63384; font-weight: 600; font-size: 0.9rem; margin-top: 5px; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="teddy">👀✨</div>
    <h1 id="title">Chno kiy3jbak f dari?</h1>
    <p class="sub" id="subTitle">Jawbi b sra7a... 😍</p>
    
    <!-- Step 1: Input dial Smiya -->
    <input type="text" id="username" placeholder="Ktebi smiytak hna 💕">
    <button id="nextBtn" class="btn" onclick="showOptions()">Khshol l'khitiyarat</button>

    <!-- Step 2: L'khiyarate -->
    <div class="options-grid" id="optionsContainer">
        <div class="option-item">
            <input type="checkbox" id="opt1" value="Ikoun 3ando l'flous 💳💸">
            <label for="opt1">Ikoun 3ando l'flous 💳💸</label>
        </div>
        <div class="option-item">
            <input type="checkbox" id="opt2" value="Ikoun zin o bogoss 👑✨">
            <label for="opt2">Ikoun zin o bogoss 👑✨</label>
        </div>
        <div class="option-item">
            <input type="checkbox" id="opt3" value="L'39liya o l'rajola 💪🧠">
            <label for="opt3">L'39liya o l'rajola 💪🧠</label>
        </div>
        <div class="option-item">
            <input type="checkbox" id="opt4" value="Kiyda7ak o fih l'bassala 😂🃏">
            <label for="opt4">Kiyda7ak o fih l'bassala 😂🃏</label>
        </div>
        
        <!-- الخانة الجديدة ديال التعبير -->
        <p class="extra-label">Zidi 3bbri hna ila bghiti... ✍️💖</p>
        <textarea id="extraText" placeholder="Chi 7aja khra kat3jbak f dari..."></textarea>
        
        <button id="submitBtn" class="btn" onclick="sendChoices()">Sift l'jawab 💌</button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
    emailjs.init("bFH6ZxbDqnq5yUiaJ");

    const usernameInput = document.getElementById("username");
    const nextBtn = document.getElementById("nextBtn");
    const optionsContainer = document.getElementById("optionsContainer");
    const messageDiv = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");
    
    let finalName = "";

    function showOptions() {
        finalName = usernameInput.value;
        if(finalName.trim() === ""){
            alert("Ktebi smitek darouri! 😭");
            return;
        }
        
        usernameInput.style.display = "none";
        nextBtn.style.display = "none";
        optionsContainer.style.display = "flex";
        document.querySelector(".teddy").innerHTML = "🤭💞";
    }

    function sendChoices() {
        let selectedChoices = [];
        for(let i = 1; i <= 4; i++) {
            let chk = document.getElementById("opt" + i);
            if(chk.checked) {
                selectedChoices.push(chk.value);
            }
        }

        const extraWrite = document.getElementById("extraText").value.trim();

        // Ila makhtarat walo o maktebaths t9ol liha khtari
        if(selectedChoices.length === 0 && extraWrite === "") {
            alert("Khtari khyar awla ktebi chi 7aja f l'khana! 🙄");
            return;
        }

        submitBtn.disabled = true;
        document.getElementById("extraText").disabled = true;
        messageDiv.style.display = "block";
        messageDiv.innerHTML = "Sabri chwiya... 💌";

        // Njm3o l'khitiyarat
        let resultText = selectedChoices.length > 0 ? selectedChoices.join(" , ") : "Ma khtarat walo mn l'khitiyarat";
        
        // Ntsiyto l'mail fih l'khitiyarat + l'ktaba dyalha
        let finalMessage = "Khtarat: " + resultText;
        if(extraWrite !== "") {
            finalMessage += " | O zadet ktabat: " + extraWrite;
        }

        emailjs.send("service_asq4pyy", "template_8nuqc4n", {
            name: finalName,
            message: finalName + " katbghi f dari -> " + finalMessage
        }).then(() => {
            optionsContainer.style.display = "none";
            document.querySelector(".teddy").innerHTML = "🥰💖";
            document.getElementById("title").innerHTML = "Merci Beaucoup!";
            document.getElementById("subTitle").innerHTML = "L'jawab dyalk wssal.";
            messageDiv.innerHTML = "Kulchi wssal b naja7! Merci beaucoup 💕";
        }).catch((err) => {
            messageDiv.innerHTML = "Wqa3 mouchkil f l'irsal.";
            submitBtn.disabled = false;
            document.getElementById("extraText").disabled = false;
        });
    }
</script>

</body>
</html>
